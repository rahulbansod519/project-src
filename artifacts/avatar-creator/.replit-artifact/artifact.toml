kind = "web"
previewPath = "/"
title = "AI Avatar Creator"
version = "1.0.0"
id = "artifacts/avatar-creator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18962

[services.development]
run = "pnpm --filter @workspace/avatar-creator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/avatar-creator", "run", "build" ]
publicDir = "artifacts/avatar-creator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18962"
BASE_PATH = "/"
